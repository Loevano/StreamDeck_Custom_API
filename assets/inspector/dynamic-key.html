<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StreamDeck Custom API Config</title>
    <link rel="stylesheet" href="./dynamic-key.css" />
  </head>
  <body>
    <main class="panel">
      <section class="section">
        <h2>Connection</h2>
        <label for="apiBaseUrl">API Base URL</label>
        <div class="row">
          <input id="apiBaseUrl" type="text" placeholder="http://127.0.0.1:8787" />
          <button id="saveSettings" type="button">Save</button>
        </div>
        <p class="hint">Used by the plugin runtime to fetch layout and state.</p>
      </section>

      <section class="section">
        <h2>Stream Deck Layout Configuration</h2>
        <div class="row">
          <button id="refreshConfig" type="button">Refresh</button>
          <span id="configStatus" class="status">Loading...</span>
        </div>
        <div id="summary" class="summary"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Page</th>
                <th>Title</th>
                <th>Layout ID</th>
                <th>Buttons</th>
              </tr>
            </thead>
            <tbody id="pagesBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./dynamic-key.js"></script>
  </body>
  </html>
